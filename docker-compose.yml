services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: grocery_saver
      POSTGRES_USER: grocery_saver
      POSTGRES_PASSWORD: grocery_saver
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grocery_saver -d grocery_saver"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
