name: Agent Review Gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

jobs:
  review-status:
    name: Require agent review status
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files
        run: >-
          git diff --name-only
          "origin/${{ github.base_ref }}...HEAD"
          > changed-files.txt

      - name: Collect pull request body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          Path("pr-body.txt").write_text(os.environ.get("PR_BODY", ""), encoding="utf-8")
          PY

      - name: Require pull request review_status passed
        run: >-
          python3 scripts/check_pr_review_status.py
          --head-ref "${{ github.head_ref }}"
          --pr-url "${{ github.event.pull_request.html_url }}"
          --pr-body-file pr-body.txt
          --changed-files-file changed-files.txt
